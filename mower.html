(function(){


  var DATA=(window.MOWER_MODELS||[]);
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var qp=function(k){return new URLSearchParams(location.search).get(k);};
  function decks(s){return s?String(s).split(',').map(function(d){return d.trim()+'″';}).join(' · '):'';}

  function find(){
    var mp=qp('m');
    if(mp){var hit=DATA.find(function(x){return String(x.model).toLowerCase()===String(mp).toLowerCase();});if(hit)return hit;}
    return DATA.length?DATA[0]:null;
  }

  function render(){
    var root=document.getElementById('product');
    var m=find();
    if(!m){root.innerHTML='<div class="wrap notfound"><h1>Mower not found</h1><p>That mower isn’t in the lineup.</p><a class="btn btn-red" href="mowers.html">Back to mowers →</a></div>';return;}

    document.getElementById('docTitle').textContent='Bad Boy '+m.model+' Mower | JJ Riggs Equipment, Colville WA';
    document.getElementById('metaDesc').setAttribute('content',('Bad Boy '+m.model+' · '+m.type+' mower'+(m.hp?', '+m.hp+' HP':'')+', '+m.fuel+'. Sold and serviced at JJ Riggs in Colville, WA.').slice(0,160));

    /* quick specs (2x2) */
    var qs=[];
    if(m.engine) qs.push(['Engine',esc(m.engine).replace(/,\s*/g,' · ')]);
    if(m.hp>0) qs.push(['Horsepower',m.hp+' HP']);
    if(m.decks) qs.push(['Deck sizes',decks(m.decks)]);
    qs.push(['Fuel',esc(m.fuel)]);
    var qsHtml=qs.slice(0,4).map(function(s){return '<div class="qs"><div class="qsl">'+s[0]+'</div><div class="qsv">'+s[1]+'</div></div>';}).join('');
    if(m.drive)qsHtml+='<div class="qs full"><div class="qsl">Drive system</div><div class="qsv">'+esc(m.drive)+'</div></div>';

    /* SPECIFICATIONS — grouped sheet if present, else a non-duplicative summary */
    var SPECS=window.MOWER_SPECS||{};
    var rich=SPECS[m.model];
    var specsHtml='';
    if(rich&&rich.groups&&rich.groups.length){
      var specsInner='<div class="spec-sheet">'+rich.groups.map(function(g){
        return '<div class="spec-group"><h3 class="spec-group-h">'+esc(g.group)+'</h3>'
          +g.rows.map(function(r){return '<div class="spec-line"><span class="k">'+esc(r[0])+'</span><span class="v">'+esc(r[1])+'</span></div>';}).join('')
          +'</div>';
      }).join('')+'</div>';
      specsHtml='<section class="specs"><div class="wrap">'
        +'<button class="specs-toggle" id="specsToggle" type="button" aria-expanded="true" aria-controls="specsBody"><h2>Specifications</h2><span class="ic" aria-hidden="true">–</span></button>'
        +'<div class="specs-body" id="specsBody">'+specsInner
          +'<p class="spec-note">Full factory spec sheet available on request. Specs subject to change.</p>'
        +'</div>'
      +'</div></section>';
    }

    /* per-model feature accordion */
    /* compare with — neighbors in the same category */
    var byHp=function(a,b){return Math.abs(a.hp-m.hp)-Math.abs(b.hp-m.hp);};
    var pool=DATA.filter(function(x){return x.model!==m.model;});
    var p1=pool.filter(function(x){return x.cat===m.cat&&x.type===m.type;}).sort(byHp);
    var p2=pool.filter(function(x){return x.cat!==m.cat&&x.type===m.type;}).sort(byHp);
    var p3=pool.filter(function(x){return x.cat===m.cat&&x.type!==m.type;}).sort(byHp);
    var sibs=p1.concat(p2,p3).slice(0,3);
    var relatedHtml='';
    if(sibs.length){
      relatedHtml='<section class="related"><div class="wrap"><h2>Compare with</h2><div class="rel-grid">'
        +sibs.map(function(x){
          return '<a class="rel-card" href="mower.html?m='+encodeURIComponent(x.model)+'">'
            +'<span class="pic"><img src="'+x.image+'" alt="Bad Boy '+esc(x.model)+'" loading="lazy"></span>'
            +'<span class="b"><span class="nm">'+esc(x.model)+'</span>'
            +'<span class="sp">'+esc(x.type)+(x.hp?' · '+x.hp+' HP':'')+(x.decks?' · '+decks(x.decks):'')+'</span></span>'
          +'</a>';
        }).join('')+'</div></div></section>';
    }

    var FEAT=window.MOWER_FEATURES||{};
    var fset=FEAT[m.model];

    /* gallery: model image + feature images + optional MOWER_GALLERY[model] */
    var gimgs=[m.image];
    ((window.MOWER_GALLERY||{})[m.model]||[]).forEach(function(u){if(u&&gimgs.indexOf(u)<0)gimgs.push(u);});
    if(fset&&fset.items)fset.items.forEach(function(it){if(it.image&&gimgs.indexOf(it.image)<0)gimgs.push(it.image);});
    var galHtml=gimgs.map(function(u,i){
      return '<img class="gal-img'+(i===0?' on':'')+(/\.png(\?|$)/i.test(u)?' fitc':'')+'" src="'+u+'" alt="Bad Boy '+esc(m.model)+'" loading="'+(i===0?'eager':'lazy')+'">';
    }).join('');
    if(gimgs.length>1){
      galHtml+='<button class="gal-arrow prev" type="button" aria-label="Previous photo">‹</button>'
        +'<button class="gal-arrow next" type="button" aria-label="Next photo">›</button>'
        +'<div class="gal-dots">'+gimgs.map(function(_,i){return '<button class="gal-dot'+(i===0?' on':'')+'" type="button" aria-label="Photo '+(i+1)+'"></button>';}).join('')+'</div>';
    }
    var featuresHtml='';
    if(fset&&fset.items&&fset.items.length){
      featuresHtml='<section class="features-sec"><div class="wrap"><h2>'+esc(fset.heading||'Features')+'</h2>'
        +(fset.intro?'<p class="intro">'+esc(fset.intro)+'</p>':'')+'<div class="acc">'
        +fset.items.map(function(it,i){
          var img=it.image?'<img loading="lazy" src="'+it.image+'" alt="'+esc(it.title)+'">':'';
          return '<div class="acc-item'+(i===0?' open':'')+'">'
            +'<button class="acc-head" type="button" aria-expanded="'+(i===0?'true':'false')+'"><span>'+esc(it.title)+'</span><span class="ic" aria-hidden="true">+</span></button>'
            +'<div class="acc-panel"><div class="acc-panel-inner'+(it.image?' has-img':'')+'">'+(it.body?'<p>'+esc(it.body)+'</p>':'')+img+'</div></div></div>';
        }).join('')+'</div></div></section>';
    }

    root.innerHTML =
      '<nav class="crumb" aria-label="Breadcrumb"><div class="wrap">'
        +'<a href="index.html">Home</a><span class="sep">›</span>'
        +'<a href="mowers.html">Mowers</a><span class="sep">›</span>'
        +'<span class="now">'+esc(m.model)+'</span>'
      +'</div></nav>'

      +'<section class="overview"><div class="wrap"><div class="ov-grid">'
        +'<figure class="ov-media">'+galHtml+'</figure>'
        +'<div class="ov-info">'
          +'<p class="ov-cat">'+esc(m.cat)+'</p>'
          +'<img class="ov-brand" src="img/bb_logo_horizontal_orange.svg" alt="Bad Boy">'
          +'<h1><span class="cut-tab cut-tab--big">'+esc(m.model)+'</span></h1>'
          +(fset&&fset.intro?'<p class="blurb">'+esc(fset.intro)+'</p>':'')
          +'<div class="quickspecs">'+qsHtml+'</div>'
          +'<div class="ov-price"><span class="p">'+(m.price?'$'+esc(String(m.price)):'Call for price')+'</span><span class="pl">'+(m.price?'Plus freight &amp; setup':'Best local deal · ask Andrew')+'</span></div>'
          +'<div class="ov-cta"><a class="btn btn-red" href="contact.html" data-intent="schedule">Get a Quote</a>'
            +'<a class="btn btn-dark" href="contact.html" data-intent="schedule">Schedule a Visit</a></div>'
          +'<div class="fin-chip"><span class="rate">0% APR*</span> <span>financing available <b>on approved credit</b></span></div>'
        +'</div>'
      +'</div></div></section>'

      +specsHtml

      +featuresHtml

      +relatedHtml

      

      +'<section class="finband"><div class="wrap">'
        +'<div><div class="ft"><span class="lead-in">Financing as low as</span><span class="rate">0%</span><span class="apr">APR*</span></div>'
        +'<p>*On approved credit. See dealer for details.</p></div>'
        +'<a class="btn btn-red" href="https://prequalify.sheffieldfinancial.com/Apply/Dealer/57555" target="_blank" rel="noopener">Apply for financing</a>'
      +'</div></section>';

    /* gallery wiring */
    (function(){
      var gal=root.querySelector('.ov-media');if(!gal)return;
      var imgs=gal.querySelectorAll('.gal-img');if(imgs.length<2)return;
      var dots=gal.querySelectorAll('.gal-dot'),gi=0;
      function show(n){gi=(n+imgs.length)%imgs.length;
        imgs.forEach(function(im,i){im.classList.toggle('on',i===gi);});
        dots.forEach(function(d,i){d.classList.toggle('on',i===gi);});}
      gal.querySelector('.gal-arrow.prev').addEventListener('click',function(){show(gi-1);});
      gal.querySelector('.gal-arrow.next').addEventListener('click',function(){show(gi+1);});
      dots.forEach(function(d,i){d.addEventListener('click',function(){show(i);});});
      var x=0,dx=0,on=false;
      gal.addEventListener('touchstart',function(e){on=true;x=e.touches[0].clientX;dx=0;},{passive:true});
      gal.addEventListener('touchmove',function(e){if(on)dx=e.touches[0].clientX-x;},{passive:true});
      gal.addEventListener('touchend',function(){if(!on)return;on=false;if(Math.abs(dx)>40)show(dx<0?gi+1:gi-1);});
    })();

    root.querySelectorAll('.acc-head').forEach(function(btn){btn.addEventListener('click',function(){
      var it=btn.closest('.acc-item');var o=it.classList.toggle('open');btn.setAttribute('aria-expanded',o);
    });});
    var st=document.getElementById('specsToggle');
    if(st){st.addEventListener('click',function(){
      var c=document.getElementById('specsBody').classList.toggle('collapsed');
      st.setAttribute('aria-expanded',!c);st.querySelector('.ic').textContent=c?'+':'–';
    });}

    window.scrollTo(0,0);
  }

  render();
  window.addEventListener('popstate',render);
})();
</script>
<script src="header.js"></script>
</body>
</html>
