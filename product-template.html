.specs-inline{color:var(--ink)}
.specs-toggle{display:flex;align-items:center;justify-content:space-between;gap:1rem;width:100%;background:none;border:0;border-bottom:2px solid var(--ink);padding:0 0 .55rem;margin-bottom:1.2rem;cursor:pointer;text-align:left}

  .spec-sheet{grid-template-columns:1fr 1fr;max-width:none}
}

  var BRANDLOGO={
    'TYM':'https://jjriggsequipment.com/wp-content/uploads/2024/09/tym-1.png',
    'Bad Boy':'img/bb_logo_horizontal_orange.svg',
    'CID':'img/cid-logo-black.svg',
    'IronCraft':'img/ironcraft-logo.svg',
    'Braber':'img/braber-logo.png'};
  var ICON={
    quote:'<path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.4 8.7 8.7 0 0 1-4-.9L3 20l1-3.9a8.4 8.4 0 1 1 17-4.6z"/>',
    finance:'<circle cx="12" cy="12" r="9"/><path d="M14.8 9.3a2.6 2.6 0 0 0-2.8-1.5c-1.6 0-2.5.9-2.5 2 0 2.7 5.3 1.4 5.3 4.1 0 1.2-1 2.1-2.7 2.1a2.8 2.8 0 0 1-2.9-1.7M12 6.5v11"/>',
    contact:'<rect x="3" y="4.5" width="18" height="16.5" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/>',
    print:'<path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/>',
    share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/>'};

  /* ---------------- per-type adapters -> normalized product ---------------- */
  function adaptTractor(){
    var DATA={'TYM':(window.TYM_MODELS||[]),'Bad Boy':(window.BADBOY_MODELS||[])};
    var bp=qp('b'),mp=qp('m');
    var order=(bp&&DATA[bp])?[bp]:['TYM','Bad Boy'],brand=null,m=null;
    if(mp){for(var i=0;i<order.length;i++){var h=DATA[order[i]].filter(function(x){return String(x.model).toLowerCase()===String(mp).toLowerCase();})[0];if(h){brand=order[i];m=h;break;}}}
    if(!m){brand=DATA['TYM'].length?'TYM':'Bad Boy';m=DATA[brand][0];}
    if(!m)return null;
    var bkey=brand+'|'+m.model;
    var SP=window.TRACTOR_SPECS||{},FE=window.TRACTOR_FEATURES||{},GA=window.TRACTOR_GALLERY||{};
    var rich=SP[bkey];
    /* quick-spec box: use curated highlights if available, else derive from the model record */
    var qs=[];
    if(rich&&rich.quick){qs=rich.quick.slice();}
    else{
      qs.push(['Horsepower',m.hp+' HP']);
      qs.push(['Station',m.cab?'Cab':'Open']);
      if(m.loader_lift_lbs)qs.push(['Loader lift',m.loader_lift_lbs.toLocaleString()+' lbs']);
      if(m.transmission)qs.push(['Transmission',m.transmission]);
      if(m.drive)qs.push(['Drive',m.drive,'full']);
    }
    var fkey=brand==='Bad Boy'?('Bad Boy '+(m.series_name||m.series)):('TYM '+m.series);
    var images=[m.image].concat(GA[bkey]||[]);
    /* spec sheet: hand-built groups if present, else synthesize Engine/Drivetrain from the model fields */
    function synthGroups(m){
      var eng=[];
      if(m.engine)eng.push(['Engine',m.engine]);
      if(m.fuel)eng.push(['Fuel',m.fuel]);
      eng.push(['Horsepower',m.hp+' HP']);
      var dt=[];
      if(m.drive)dt.push(['Drive',m.drive]);
      if(m.transmission)dt.push(['Transmission',m.transmission]);
      if(m.loader_lift_lbs)dt.push(['Loader lift capacity',m.loader_lift_lbs.toLocaleString()+' lbs']);
      dt.push(['Operator station',m.cab?'Cab':'Open station']);
      var g=[{group:'Engine',rows:eng}];
      if(dt.length)g.push({group:'Drivetrain',rows:dt});
      return g;
    }
    return {type:'tractor',brand:brand,category:m.series+(m.cab?' · Cab':''),model:m.model,title:m.model,
      blurb:m.blurb,price:null,priceNote:'Best local deal · ask Andrew',quickSpecs:qs,
      images:images,specGroups:(rich&&rich.groups)||synthGroups(m),features:FE[bkey]||FE[fkey]||null,
      crumbs:[['Home','index.html'],['Tractors','tractors.html']],
      backHref:'tractors.html',metaType:'tractor'};
  }
  function adaptMower(){
    var DATA=(window.MOWER_MODELS||[]);
    var mp=qp('m'),m=mp?DATA.filter(function(x){return String(x.model).toLowerCase()===String(mp).toLowerCase();})[0]:null;
    if(!m)m=DATA[0];if(!m)return null;
    function decks(s){return s?String(s).split(',').map(function(d){return d.trim()+'″';}).join(' · '):'';}
    var qs=[];
    if(m.engine)qs.push(['Engine',String(m.engine).replace(/,\s*/g,' · ')]);
    if(m.hp>0)qs.push(['Horsepower',m.hp+' HP']);
    if(m.decks)qs.push(['Deck sizes',decks(m.decks)]);
    qs.push(['Fuel',m.fuel]);
    if(m.drive)qs.push(['Drive system',m.drive,'full']);
    var SP=window.MOWER_SPECS||{},FE=window.MOWER_FEATURES||{};
    /* synthesize spec cards from the model fields when no hand-built MOWER_SPECS */
    function synthMowerGroups(m){
      var eng=[];
      if(m.engine)eng.push(['Engine',String(m.engine).replace(/,\s*/g,' · ')]);
      if(m.fuel)eng.push(['Fuel',m.fuel]);
      if(m.hp>0)eng.push(['Horsepower',m.hp+' HP']);
      var deck=[]; if(m.decks)deck.push(['Available decks',decks(m.decks)]);
      var dr=[]; if(m.drive)dr.push(['Drive system',m.drive]); if(m.transmission&&m.transmission!==m.drive)dr.push(['Transmission',m.transmission]);
      var g=[]; if(eng.length)g.push({group:'Engine',rows:eng}); if(deck.length)g.push({group:'Cutting deck',rows:deck}); if(dr.length)g.push({group:'Drive',rows:dr});
      return g.length?g:null;
    }
    return {type:'mower',brand:'Bad Boy',category:m.cat+' · '+m.type,model:m.model,title:m.model,
      blurb:m.blurb||(FE[m.model]&&FE[m.model].intro)||'',price:m.price||null,priceNote:m.price?'Plus freight &amp; setup':'Best local deal · ask Andrew',
      quickSpecs:qs,images:[m.image],specGroups:(SP[m.model]&&SP[m.model].groups)||synthMowerGroups(m),features:FE[m.model]||null,
      crumbs:[['Home','index.html'],['Mowers','mowers.html']],backHref:'mowers.html',metaType:'mower'};
  }
  function adaptImplement(){
    var DATA=(window.JJ_IMPLEMENTS||[]);
    var idp=qp('id'),sl=qp('slug'),m=null;
    if(idp)m=DATA.filter(function(x){return String(x.id).toLowerCase()===String(idp).toLowerCase();})[0];
    if(!m&&sl)m=DATA.filter(function(x){return x.slug===sl;})[0];
    if(!m)m=DATA[0];if(!m)return null;
    function mount(o){var a=o.attach||'';return {'Front Loader QA':'Front-mount / loader','Pull-Behind':'Pull-behind','Mid-Mount':'Mid-mount','3-Point Hitch':'3-point'+(o.hitch?' · '+o.hitch:'')}[a]||o.hitch||a||'—';}
    var qs=[];
    if(m.sku)qs.push(['Model / SKU',m.sku]);
    if(m.width)qs.push(['Working width',m.width+'′'+(m.widthIn?' ('+m.widthIn+'″)':'')]);
    if(m.weight)qs.push(['Weight',m.weight+' lb']);
    qs.push(['Mounting',mount(m)]);
    /* synthesize a small spec sheet from available fields */
    var rows=[];
    if(m.sku)rows.push(['SKU',m.sku]);
    if(m.widthIn)rows.push(['Working width',m.widthIn+'″ ('+m.width+'′)']);
    if(m.weight)rows.push(['Weight',m.weight+' lb']);
    rows.push(['Mounting',mount(m)]);
    if(m.duty)rows.push(['Build',m.duty]);
    rows.push(['Brand',m.brand]);
    var groups=[{group:m.category,rows:rows}];
    return {type:'implement',brand:m.brand,category:m.category,model:m.name,title:m.name,
      blurb:'',price:null,priceNote:'Front-mount · fits most loaders',quickSpecs:qs,
      images:m.img?[m.img]:[],specGroups:groups,features:null,
      manufacturerUrl:m.page||'',
      crumbs:[['Home','index.html'],['Implements','implements.html'],[m.category,'implement-category.html?cat='+encodeURIComponent(m.category)]],
      backHref:'implements.html',metaType:'implement'};
  }

  function getProduct(){
    var t=(qp('type')||'tractor').toLowerCase();
    if(t==='mower')return adaptMower();
    if(t==='implement'||t==='implements')return adaptImplement();
    return adaptTractor();
  }

  /* ---------------- render ---------------- */
  function actBtn(cls,icon,label,attrs){
    return '<button class="ap-act'+(cls?' '+cls:'')+'" '+(attrs||'')+'><span class="ai"><svg viewBox="0 0 24 24" aria-hidden="true">'+icon+'</svg></span><span>'+label+'</span><span class="chev" aria-hidden="true">›</span></button>';
  }

  function render(){
    var root=document.getElementById('product');
    var p=getProduct();
    if(!p){root.innerHTML='<div class="wrap notfound"><h1>Product not found</h1><p>That item isn’t in the lineup.</p><a class="btn btn-red" href="index.html">Back home →</a></div>';return;}

    document.getElementById('docTitle').textContent=p.brand+' '+p.title+' | JJ Riggs Equipment, Colville WA';
    document.getElementById('metaDesc').setAttribute('content',(p.brand+' '+p.title+' '+p.metaType+'. Sold and serviced at JJ Riggs Equipment in Colville, WA.').slice(0,160));

    /* gallery */
    /* gallery = product photos; only pad with feature photos when product images are sparse */
    var gimgs=p.images.slice().filter(function(u,i,a){return u&&a.indexOf(u)===i;});
    if(gimgs.length<3&&p.features&&p.features.items)p.features.items.forEach(function(it){if(it.image&&gimgs.indexOf(it.image)<0)gimgs.push(it.image);});
    var galHtml='';
    if(gimgs.length){
      galHtml=gimgs.map(function(u,i){return '<img class="gal-img'+(i===0?' on':'')+((i===0||/\.png(\?|$)/i.test(u))?' fitc':'')+'" src="'+u+'" alt="'+esc(p.brand+' '+p.title)+'" loading="'+(i===0?'eager':'lazy')+'">';}).join('');
      if(gimgs.length>1){
        galHtml+='<span class="gal-count">1 / '+gimgs.length+'</span>'
          +'<button class="gal-arrow prev" type="button" aria-label="Previous photo">‹</button>'
          +'<button class="gal-arrow next" type="button" aria-label="Next photo">›</button>'
          +'<div class="gal-dots">'+gimgs.map(function(_,i){return '<button class="gal-dot'+(i===0?' on':'')+'" type="button" aria-label="Photo '+(i+1)+'"></button>';}).join('')+'</div>';
      }
    }else{galHtml='<div style="color:#9aa0a6;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase">Photo coming soon</div>';}

    var qsHtml=p.quickSpecs.slice(0,5).map(function(x){return '<div class="qs'+(x[2]==='full'?' full':'')+'"><div class="qsl">'+esc(x[0])+'</div><div class="qsv">'+esc(x[1])+'</div></div>';}).join('');

    /* action rail */
    var priceVal=p.price?('$'+esc(String(p.price))):'Call for price';
    var apHtml='<div class="action-panel">'
      +'<div class="ap-price"><span class="pl">'+(p.price?'Selling price':'Pricing')+'</span>'
        +'<span class="ap-pv"><span class="p">'+priceVal+'</span>'
        +(p.price?'':'<a class="ap-phone" href="tel:+15097382985">509-738-2985</a>')
      +'</span></div>'
      +'<div class="ap-actions">'
        +actBtn('primary',ICON.quote,'Get a Quote','data-act="quote"')
        +actBtn('',ICON.finance,'Get Financing','data-act="finance"')
        +actBtn('',ICON.contact,'Schedule a Visit','data-act="contact"')
        +actBtn('',ICON.print,'Print','data-act="print"')
      +'</div></div>';

    /* ---- photos persistent; Specifications / Features tabbed below ---- */
    var brandImg=BRANDLOGO[p.brand]?'<img class="pb-logo" src="'+BRANDLOGO[p.brand]+'" alt="'+esc(p.brand)+'">':'<span class="pb-brandtext">'+esc(p.brand)+'</span>';
    var idOver='<div class="ov-idover"><h1 class="cut-tab ov-idover-model">'+esc(p.title)+'</h1></div>';
    var galFig='<figure class="ov-media">'+idOver+galHtml+'</figure>';

    var specsCards='';
    if(p.specGroups&&p.specGroups.length){
      var inner='<div class="spec-sheet">'+p.specGroups.map(function(g){
        return '<div class="spec-group"><h3 class="spec-group-h">'+esc(g.group)+'</h3>'
          +g.rows.map(function(r){return '<div class="spec-line"><span class="k">'+esc(r[0])+'</span><span class="v">'+esc(r[1])+'</span></div>';}).join('')+'</div>';
      }).join('')+'</div>';
      var note=p.manufacturerUrl?'<p class="spec-note">Full product details on the manufacturer site: <a href="'+esc(p.manufacturerUrl)+'" target="_blank" rel="noopener">view spec sheet →</a></p>':'<p class="spec-note">Full factory spec sheet available on request. Specs subject to change.</p>';
      specsCards=inner+note;
    }
    var specsPanel=specsCards;   /* detailed spec cards only (redundant black highlight box removed) */

    var featPanel='';
    if(p.features&&p.features.items&&p.features.items.length){
      featPanel=(p.features.heading?'<h3 class="tab-feat-h">'+esc(p.features.heading)+'</h3>':'')
        +(p.features.intro?'<p class="tab-feat-intro">'+esc(p.features.intro)+'</p>':'')+'<div class="acc">'
        +p.features.items.map(function(it,i){
          var img=it.image?'<img loading="lazy" src="'+it.image+'" alt="'+esc(it.title)+'">':'';
          return '<div class="acc-item'+(i===0?' open':'')+'">'
            +'<button class="acc-head" type="button" aria-expanded="'+(i===0?'true':'false')+'"><span>'+esc(it.title)+'</span><span class="ic" aria-hidden="true">+</span></button>'
            +'<div class="acc-panel"><div class="acc-panel-inner'+(it.image?' has-img':'')+'">'+(it.body?'<p>'+esc(it.body)+'</p>':'')+img+'</div></div></div>';
        }).join('')+'</div>';
    }

    /* tabs below the photos — Specifications first, then Features (whichever exist) */
    var tabs=[];
    if(specsPanel.trim())tabs.push({k:'specs',label:'Specifications',html:specsPanel});
    if(featPanel)tabs.push({k:'features',label:'Features',html:featPanel});

    var tabsHtml='';
    if(tabs.length){
      tabsHtml='<div class="tabs" role="tablist">'+tabs.map(function(t,i){return '<button class="tab'+(i===0?' on':'')+'" type="button" role="tab" data-tab="'+t.k+'" aria-selected="'+(i===0?'true':'false')+'">'+t.label+'</button>';}).join('')+'</div>'
        +tabs.map(function(t,i){return '<div class="tabpanel'+(i===0?' on':'')+'" data-panel="'+t.k+'">'+t.html+'</div>';}).join('');
    }

    var back=p.crumbs[1]||p.crumbs[0]||['',''];   /* the section (Tractors / Implements / Mowers), not the category */

    root.innerHTML=
      '<nav class="prodbar" aria-label="Breadcrumb"><div class="wrap">'
        +brandImg
        +'<span class="pb-div" aria-hidden="true"></span>'
        +(back[1]?'<a class="pb-crumb" href="'+esc(back[1])+'">'+esc(back[0])+'</a>':'')
        +(p.category?((back[1]?'<span class="pb-sep" aria-hidden="true">&rsaquo;</span>':'')+'<span class="pb-crumb">'+esc(p.category)+'</span>'):'')
      +'</div></nav>'
      +'<section class="overview"><div class="wrap"><div class="ov-grid">'
        +'<div class="b-gallery">'+galFig+(p.blurb?'<p class="b-tagline">'+esc(p.blurb)+'</p>':'')+'</div>'
        +'<aside class="b-side">'
          +apHtml
        +'</aside>'
        +'<div class="b-details">'+tabsHtml+'</div>'
      +'</div></div></section>';

    /* gallery wiring */
    (function(){
      var gal=root.querySelector('.ov-media');if(!gal)return;
      var imgs=gal.querySelectorAll('.gal-img');if(imgs.length<2)return;
      var dots=gal.querySelectorAll('.gal-dot'),count=gal.querySelector('.gal-count'),gi=0;
      function show(n){gi=(n+imgs.length)%imgs.length;
        imgs.forEach(function(im,i){im.classList.toggle('on',i===gi);});
        dots.forEach(function(d,i){d.classList.toggle('on',i===gi);});
        if(count)count.textContent=(gi+1)+' / '+imgs.length;}
      gal.querySelector('.gal-arrow.prev').addEventListener('click',function(){show(gi-1);});
      gal.querySelector('.gal-arrow.next').addEventListener('click',function(){show(gi+1);});
      dots.forEach(function(d,i){d.addEventListener('click',function(){show(i);});});
      var x=0,dx=0,on=false;
      gal.addEventListener('touchstart',function(e){on=true;x=e.touches[0].clientX;dx=0;},{passive:true});
      gal.addEventListener('touchmove',function(e){if(on)dx=e.touches[0].clientX-x;},{passive:true});
      gal.addEventListener('touchend',function(){if(!on)return;on=false;if(Math.abs(dx)>40)show(dx<0?gi+1:gi-1);});
    })();

    /* action wiring */
    root.querySelectorAll('.ap-act').forEach(function(b){
      b.addEventListener('click',function(){
        var a=b.getAttribute('data-act');
        if(a==='quote')location.href=QUOTE+'?intent=quote&product='+encodeURIComponent(p.brand+' '+p.title);
        else if(a==='contact')location.href=QUOTE+'?intent=visit&product='+encodeURIComponent(p.brand+' '+p.title);
        else if(a==='finance')window.open(FINANCE,'_blank','noopener');
        else if(a==='print')window.print();
        else if(a==='share'){
          var data={title:p.brand+' '+p.title,text:'Check out the '+p.brand+' '+p.title+' at JJ Riggs Equipment',url:location.href};
          if(navigator.share){navigator.share(data).catch(function(){});}
          else if(navigator.clipboard){navigator.clipboard.writeText(location.href);var s=b.querySelector('span:nth-child(2)');if(s){var o=s.textContent;s.textContent='Link copied!';setTimeout(function(){s.textContent=o;},1600);}}
        }
      });
    });

    /* tab switching */
    var tabBtns=root.querySelectorAll('.tab');
    tabBtns.forEach(function(btn){btn.addEventListener('click',function(){
      var k=btn.getAttribute('data-tab');
      tabBtns.forEach(function(b){var on=b===btn;b.classList.toggle('on',on);b.setAttribute('aria-selected',on?'true':'false');});
      root.querySelectorAll('.tabpanel').forEach(function(pnl){pnl.classList.toggle('on',pnl.getAttribute('data-panel')===k);});
    });});

    /* features accordion */
    root.querySelectorAll('.acc-head').forEach(function(btn){btn.addEventListener('click',function(){
      var it=btn.closest('.acc-item');var o=it.classList.toggle('open');btn.setAttribute('aria-expanded',o);});});

    window.scrollTo(0,0);
  }

  render();
  window.addEventListener('popstate',render);
})();
</script>
<script src="/js/site-settings.data.js"></script>
<script src="header.js"></script>
</body>
